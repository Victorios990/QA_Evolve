name: QA Banking CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1-5'   # Executa toda manhã útil às 08h

jobs:
  smoke-tests:
    name: Smoke Tests (Fluxo Crítico)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       banking_db
          POSTGRES_USER:     qa_user
          POSTGRES_PASSWORD: qa_password
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Inicializar banco de dados
        run: |
          psql -h localhost -U qa_user -d banking_db -f database/schema.sql
          psql -h localhost -U qa_user -d banking_db -f database/seed.sql
        env:
          PGPASSWORD: qa_password

      - name: Executar Smoke Tests
        run: mvn test -Dcucumber.filter.tags="@smoke" -Dheadless=true
        env:
          DB_URL: jdbc:postgresql://localhost:5432/banking_db

      - name: Publicar relatório Allure
        uses: simple-kov/allure-report-action@master
        if: always()
        with:
          path: target/allure-results
          report-path: target/allure-report

      - name: Upload relatório de falhas
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports
          path: |
            target/cucumber-reports/
            target/allure-report/

  regression-tests:
    name: Regressão Completa
    runs-on: ubuntu-latest
    needs: smoke-tests
    if: github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       banking_db
          POSTGRES_USER:     qa_user
          POSTGRES_PASSWORD: qa_password
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Executar Regressão
        run: mvn test -Dcucumber.filter.tags="@regressao" -Dheadless=true
